name: CI-CD InfraFlow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Linting & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint api-service Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api-service/Dockerfile

      - name: Lint web-service Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: web-service/Dockerfile

      - name: Lint Bash scripts (ShellCheck)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'

  build:
    name: Build Docker Images
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build api-service image
        run: docker build -t infraflow-api:sha-${{ github.sha }} ./api-service

      - name: Build web-service image
        run: docker build -t infraflow-web:sha-${{ github.sha }} ./web-service

      - name: Save images as artifacts
        run: |
          docker save infraflow-api:sha-${{ github.sha }} > api-image.tar
          docker save infraflow-web:sha-${{ github.sha }} > web-image.tar

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api-image.tar
            web-image.tar

  security-scan:
    name: Security Scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download images
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images
        run: |
          docker load < api-image.tar
          docker load < web-image.tar

      - name: Run Trivy on api-service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: infraflow-api:sha-${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          output: trivy-report.txt

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.txt

  push:
    name: Push to Registry
    needs: security-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push api-service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/infraflow-api:sha-${{ github.sha }} ./api-service
          docker push ${{ secrets.DOCKER_USERNAME }}/infraflow-api:sha-${{ github.sha }}

      - name: Build and push web-service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/infraflow-web:sha-${{ github.sha }} ./web-service
          docker push ${{ secrets.DOCKER_USERNAME }}/infraflow-web:sha-${{ github.sha }}